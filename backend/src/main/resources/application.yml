server:
  port: 8080

spring:
  application:
    name: mini-mes-backend
  datasource:
    url: ${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=mini_mes;encrypt=true;trustServerCertificate=true}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  sql:
    init:
      mode: never

logging:
  level:
    org.hibernate.SQL: warn

app:
  cors:
    # 운영 시 반드시 회사 프론트 도메인으로 교체
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5500}
